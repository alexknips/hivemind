# HiveMind — Fly.io deployment config (cheapest possible)
#
# Before first deploy:
#   1. Create the app:
#        fly launch --name <YOUR-APP-NAME> --region <YOUR-REGION> --no-deploy
#      e.g. fly launch --name hivemind-api --region sea --no-deploy
#
#   2. Provision a tiny Fly Postgres cluster (cheapest; stays running, ~$2/mo):
#        fly postgres create \
#          --name hivemind-pg \
#          --region <YOUR-REGION> \
#          --vm-size shared-cpu-1x \
#          --volume-size 1
#      Then attach it:
#        fly postgres attach hivemind-pg --app <YOUR-APP-NAME>
#      (This sets HIVEMIND_DATABASE_URL automatically via fly secrets.)
#
#   3. Set the remaining secrets:
#        fly secrets set \
#          HIVEMIND_API_KEY=<strong-random-secret> \
#          --app <YOUR-APP-NAME>
#      Optional (enables Layer-3 classifier on ingest):
#        fly secrets set HIVEMIND_ANTHROPIC_API_KEY=<key> --app <YOUR-APP-NAME>
#
#   4. Deploy:
#        fly deploy --app <YOUR-APP-NAME>
#
# Replace the placeholder values below with your real app name and region.

app = "REPLACE-WITH-YOUR-APP-NAME"
primary_region = "REPLACE-WITH-YOUR-REGION"

[build]
dockerfile = "Dockerfile"

# Runtime env — non-secret config only. Secrets go through `fly secrets set`.
[env]
HIVEMIND_PORT = "8080"
# HIVEMIND_DATABASE_URL is injected by `fly postgres attach` — do NOT put it here.

[http_service]
internal_port = 8080
force_https = true
# Scale to zero when idle — the app machine is ~$0 while stopped.
# Fly starts it automatically on the first request (cold start ~1-3s).
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "get"
timeout = "5s"
path = "/v1/health"

[[vm]]
memory = "256mb"
cpu_kind = "shared"
cpus = 1
