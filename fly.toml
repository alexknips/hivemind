# HiveMind — Fly.io deployment config (cheapest possible)
#
# Before first deploy:
#   1. Create the app (already done — live as hivemind-tti3sa in lax):
#        fly launch --name hivemind-tti3sa --region lax --no-deploy
#
#   2. Database = Neon Postgres (free tier; SQLite is no longer used).
#      Use the Neon DIRECT endpoint, NOT the -pooler one — PgBouncer txn-mode
#      breaks rust-postgres prepared statements. Keep sslmode=require.
#        fly secrets set HIVEMIND_DATABASE_URL='postgresql://USER:PW@ep-xxxx.REGION.aws.neon.tech/neondb?sslmode=require' --app hivemind-tti3sa
#
#   3. Set the remaining secrets:
#        fly secrets set HIVEMIND_API_KEY=<strong-random-secret> --app hivemind-tti3sa
#      Optional (enables Layer-3 classifier on ingest):
#        fly secrets set HIVEMIND_ANTHROPIC_API_KEY=<key> --app hivemind-tti3sa
#
#   4. Deploy from a CLEAN clone of origin/master (the rig root may sit on a
#      stale branch — do not deploy from it):
#        git clone --depth 1 git@github.com:alexknips/hivemind /tmp/hmdeploy && cd /tmp/hmdeploy
#        fly deploy --app hivemind-tti3sa --remote-only
#      The image builds with --features shared-backend-postgres (Neon needs native-TLS).

app = "hivemind-tti3sa"
primary_region = "lax"

[build]
dockerfile = "Dockerfile"

# Runtime env — non-secret config only. Secrets go through `fly secrets set`.
[env]
HIVEMIND_PORT = "8080"
# HIVEMIND_DATABASE_URL is a Fly secret (Neon direct endpoint) — do NOT put it here.

[http_service]
internal_port = 8080
force_https = true
# Scale to zero when idle — the app machine is ~$0 while stopped.
# Fly starts it automatically on the first request (cold start ~1-3s).
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "get"
timeout = "5s"
path = "/v1/health"

[[vm]]
memory = "256mb"
cpu_kind = "shared"
cpus = 1
