[package]
name = "hivemind"
version = "0.1.0"
edition = "2021"

[lib]
name = "hivemind"
path = "src/lib.rs"

[dependencies]
chrono = { version = "0.4.44", features = ["serde"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
thiserror = "2.0.17"
uuid = { version = "1.23.1", features = ["serde", "v4"] }

[dev-dependencies]
jsonschema = { version = "0.46.5", default-features = false }
