    title: "Use Sentry for error monitoring and Datadog for infrastructure metrics"
    rationale: >
      Two tools rather than one: Sentry owns application errors (stack traces,
      release tracking, user context); Datadog owns infra metrics, APM, and
      logs.  Evaluated New Relic (all-in-one) — worse DX for Rust, higher cost
