  - id: "d-020"
    title: "Reorganise engineering into a Platform team and a Product teams"
    rationale: >
      Single-team structure creates coordination overhead as we approach 20
      engineers.  Platform team owns: payments infra, auth, DB, deployment.
      Product teams (2) own: Merchant Dashboard and Partner API.
      Avoids a third-tier hierarchy that would slow decisions.
