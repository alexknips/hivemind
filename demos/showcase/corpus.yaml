evidence:
  - id: "ev-001"
    content: >
      Load-test run 2026-01-08: Postgres sustained 220 TPS/tenant at 50 concurrent
      connections on db.t3.xlarge.  MySQL reached 190 TPS but showed lock contention
      at 30+ connections.  DynamoDB showed p99 latency > 90 ms on aggregate queries.
    actor: "agent:claude:arch"
    source: document
    source_ref: "gdoc:arch-benchmarks-jan-2026"
    occurred_at: "2026-01-08T14:00:00Z"

  - id: "ev-002"
    content: >
      Stripe API integration spike: p99 charge latency 320 ms, p50 180 ms across
      10 k sample transactions.  Adyen average 410 ms, higher variance.  Square
      unavailable for B2B-only use-case without retail plan.
    actor: "agent:claude:arch"
    source: document
    source_ref: "gdoc:payments-api-spike-mar-2026"
    occurred_at: "2026-03-05T11:30:00Z"

  - id: "ev-003"
    content: >
      Legal memo 2026-03-15: SAQ-A applies when card data is handled exclusively
      via Stripe-hosted iframe (Stripe Elements).  We never touch raw PANs.
      SAQ-D would apply only if we wrote our own card-capture forms.
    actor: "human:sarah-l"
    source: document
    source_ref: "gdoc:pci-legal-memo-mar-2026"
    occurred_at: "2026-03-15T09:00:00Z"

  - id: "ev-004"
    content: >
      Incident report 2026-05-12: 3 long-lived API tokens leaked via a
      compromised developer laptop.  Tokens had no expiry.  No production payment
      data accessed (confirmed via audit logs).  Root cause: tokens in .env files
      synced to personal cloud backup.
    actor: "human:sarah-l"
    source: slack
    source_ref: "slack:C07INCIDENT:1747046400"
    occurred_at: "2026-05-12T16:30:00Z"

  - id: "ev-005"
    content: >
      EU market research Q3 2026: 38 % of surveyed e-commerce platforms are
      actively expanding to EU within 12 months.  Top blocker cited: lack of
      localised payment methods (iDEAL, SOFORT, Bancontact).
    actor: "human:dan-r"
    source: document
    source_ref: "gdoc:eu-market-research-aug-2026"
    occurred_at: "2026-08-20T10:00:00Z"

  - id: "ev-006"
    content: >
      WorkOS incident post-mortem 2026-07-03: 47-minute outage affecting all
      WorkOS-hosted SSO.  Root cause: DNS propagation failure during datacenter
      maintenance.  Acme Payments saw 12 % login failure rate during window.
    actor: "human:priya-k"
    source: document
    source_ref: "gdoc:workos-outage-postmortem-jul-2026"
    occurred_at: "2026-07-04T09:00:00Z"

  - id: "ev-007"
    content: >
      GDPR counsel memo 2026-09-02: Processing EU residents' payment data requires
      Article 30 record-keeping, DPO appointment if processing is large-scale,
      and a Transfer Impact Assessment for US→EU data flows.  SAQ-A scope does
      not cover GDPR obligations.
    actor: "human:sarah-l"
    source: document
    source_ref: "gdoc:gdpr-counsel-memo-sep-2026"
    occurred_at: "2026-09-02T14:00:00Z"

  - id: "ev-008"
    content: >
      AWS vs GCP TCO model (2026-01-15): 3-year TCO at projected scale —
      AWS $1.2 M, GCP $1.05 M, Azure $1.35 M.  AWS wins on existing team
      familiarity (8/12 engineers have AWS certs) and breadth of managed services
      (RDS, SQS, Lambda all needed).  GCP savings insufficient to offset
      retraining cost.
    actor: "agent:claude:arch"
    source: document
    source_ref: "gdoc:cloud-tco-jan-2026"
    occurred_at: "2026-01-15T10:00:00Z"

  - id: "ev-009"
    content: >
      Auth scalability test 2026-06-18: stateless JWT with in-memory session
      cache fails at 520 concurrent users — cache eviction races cause 8 %
      401 error rate.  Adding Redis eliminates errors but doubles p99 latency
      to 420 ms.  WorkOS hosted auth baseline: 280 ms p99 at 1000 concurrent.
    actor: "agent:claude:sec"
    source: document
    source_ref: "gdoc:auth-scale-test-jun-2026"
    occurred_at: "2026-06-18T15:00:00Z"

