  - id: "d-021"
    title: "Move merchant onboarding to self-serve (remove white-glove prerequisite)"
    rationale: >
      White-glove onboarding caps throughput at 8 new merchants/month
      (3 sales engineers, full-day sessions).  Self-serve with docs + sandbox
      targets 50+ merchants/month.  B2B SaaS comps show self-serve achieves
      comparable activation rates when sandbox is frictionless.
      Requires: improved CLI quickstart, hosted sandbox env, video walkthroughs.
