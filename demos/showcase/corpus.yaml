  - id: "d-019"
    title: "Upgrade to PCI DSS Level 1 compliance ahead of EU launch"
    rationale: >
      EU enterprise customers require PCI Level 1 (Report on Compliance,
      not self-assessment).  Current SAQ-A is insufficient for contracts
      above €1 M GMV/year.  Level 1 audit cost ($120 K) is offset by
      unlocking the enterprise tier.  Audit scope: Stripe integration,
      tokenisation flow, audit logging.
    actor: "human:sarah-l"
    topic_keys: [security, payments]
