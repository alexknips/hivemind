  # ── Chapter 6: Compliance & Scale (Oct–Dec 2026) ──────────────────────────

  - id: "d-018"
    title: "Appoint external DPO firm for GDPR compliance"
    rationale: >
      GDPR Article 37 mandates a Data Protection Officer when processing
      large-scale sensitive data.  In-house DPO would cost ~$180 K/year
      (loaded) plus 3–6 months to hire.  External DPO firm at $36 K/year
      provides immediate coverage, regulatory network, and scales with
      headcount.  Selected firm: DataGuard (EU-specialist).
