  - id: "d-022"
    title: "Adopt Temporal.io for all long-running payment workflow orchestration"
    rationale: >
      Payout workflows, dispute handling, and reconciliation jobs all need
      durable execution with retries.  Current approach (SQS + Lambda + ad-hoc
      state in Postgres) has caused 4 data-consistency incidents in 2026.
      Temporal provides durable saga patterns, built-in replay, and a workflow
      history UI.  Replaces ad-hoc queue/cron approach.
