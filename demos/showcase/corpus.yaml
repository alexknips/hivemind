# ---------------------------------------------------------------------------
# DECISIONS
# Ordered by occurred_at (narrative chronology).
# Fields:
#   id, title, rationale, actor, topic_keys, source, source_ref, occurred_at
#   options:  [{label, chosen}]
#   hypotheses: [id]
#   evidence: [id]
#   accepted_by: [actor_id]   → decision.accepted events
#   rejected_by: [actor_id]   → decision.rejected events  (contested if both)
#   superseded_by: id         → decision.superseded event
#   score:
#     stakes: float           → unbounded (log-scale magnitude)
#     irreversibility: float  → [0,1]
#     actionability: float    → [0,1]
#     quality: float          → composite [0,1]
