decisions:

  # ── Chapter 1: Foundation (Jan 2026) ──────────────────────────────────────

  - id: "d-001"
    title: "Use Postgres as the primary transactional database"
    rationale: >
      We need ACID transactions, row-level locking for concurrent payment
      writes, and mature JSON support for event payloads.  MySQL had lock
      contention at 30+ connections in our bench.  DynamoDB's aggregate
      query latency (>90 ms p99) is unacceptable for dashboard queries.
      Postgres on RDS managed instances gives us maintenance, failover,
      and backups without ops overhead.
    actor: "human:alex-m"
    topic_keys: [infrastructure]
    source: slack
    source_ref: "slack:C07ARCH:1736467200"
    occurred_at: "2026-01-10T10:00:00Z"
    options:
      - {label: "Postgres", chosen: true}
      - {label: "MySQL", chosen: false}
      - {label: "DynamoDB", chosen: false}
    evidence: [ev-001]
    accepted_by: [human:priya-k, human:alex-m]
    score:
      stakes: 85.0
      irreversibility: 0.80
      actionability: 1.0
      quality: 0.82

  - id: "d-002"
    title: "Run all infrastructure on AWS (primary cloud provider)"
    rationale: >
      8 of 12 engineers hold AWS certifications.  TCO model over 3 years
      shows AWS at $1.2 M vs GCP $1.05 M — the $150 K saving does not
      offset ~$400 K in retraining and tooling migration costs.  AWS managed
      services (RDS, SQS, Lambda) cover our full stack without third-party
      glue.  Azure ruled out: highest TCO + weakest managed payments ecosystem.
    actor: "human:alex-m"
    topic_keys: [infrastructure]
    source: document
    source_ref: "gdoc:cloud-decision-jan-2026"
    occurred_at: "2026-01-18T14:00:00Z"
    options:
      - {label: "AWS", chosen: true}
      - {label: "GCP", chosen: false}
      - {label: "Azure", chosen: false}
    evidence: [ev-008]
    accepted_by: [human:tom-b, human:priya-k]
    score:
      stakes: 90.0
      irreversibility: 0.75
      actionability: 1.0
      quality: 0.85

  - id: "d-003"
    title: "Use stateless JWT + in-memory session cache for API authentication"
    rationale: >
      Auth0 and WorkOS both introduce vendor lock-in at a $24 K/year price
      point we can't justify pre-Series-A.  Stateless JWT avoids Redis
      dependency and keeps p99 auth latency under 50 ms in our test env.
      We'll revisit at 500+ concurrent users.
    actor: "human:alex-m"
    topic_keys: [security]
    source: cli
    occurred_at: "2026-01-22T11:00:00Z"
    options:
      - {label: "Stateless JWT + in-memory cache", chosen: true}
      - {label: "WorkOS AuthKit", chosen: false}
      - {label: "Auth0", chosen: false}
    hypotheses: [hy-001]
    accepted_by: [human:priya-k]
    superseded_by: "d-010"
    score:
      stakes: 60.0
      irreversibility: 0.50
      actionability: 1.0
      quality: 0.38

  - id: "d-004"
    title: "Use Rust as the primary backend language"
    rationale: >
      Payments infra requires predictable latency, memory safety, and
      auditability.  Go is a reasonable alternative but our two senior
      engineers have Rust production experience.  Node is ruled out:
      async GC pauses are unacceptable for payment critical paths.
      We accept the steeper onboarding curve given the safety payoff.
    actor: "human:alex-m"
    topic_keys: [engineering]
    source: cli
    occurred_at: "2026-01-25T10:00:00Z"
    options:
      - {label: "Rust", chosen: true}
      - {label: "Go", chosen: false}
      - {label: "Node.js", chosen: false}
    accepted_by: [human:priya-k, human:tom-b]
    score:
      stakes: 70.0
      irreversibility: 0.85
      actionability: 1.0
      quality: 0.79

  # ── Chapter 2: Payment Provider (Mar 2026) ────────────────────────────────

  - id: "d-005"
    title: "Use Stripe as our primary payment processor"
    rationale: >
      Stripe Connect covers our B2B marketplace model with direct charges
      and instant payouts.  API latency p99 is 320 ms vs Adyen's 410 ms.
      Square requires a retail plan and doesn't support B2B-only.
      Stripe's ecosystem (Radar fraud, Revenue Recognition, Data Pipeline)
      means we buy vs build on ancillary products.
    actor: "human:dan-r"
    topic_keys: [payments]
    source: document
    source_ref: "gdoc:payments-provider-decision-mar-2026"
    occurred_at: "2026-03-08T14:00:00Z"
    options:
      - {label: "Stripe Connect", chosen: true}
      - {label: "Adyen for Platforms", chosen: false}
      - {label: "Square", chosen: false}
    evidence: [ev-002]
    accepted_by: [human:tom-b, human:alex-m, human:priya-k]
    score:
      stakes: 110.0
      irreversibility: 0.70
      actionability: 1.0
      quality: 0.81

  - id: "d-006"
    title: "Maintain PCI DSS SAQ-A compliance scope (not SAQ-D)"
    rationale: >
      We use Stripe Elements exclusively for card capture — card data never
      touches our servers.  Legal confirms SAQ-A applies.  SAQ-D would require
      quarterly scans and annual on-site assessment, adding ~$80 K/year.
      Constraint: we must never render our own card-input forms.
    actor: "human:sarah-l"
    topic_keys: [security, payments]
    source: document
    source_ref: "gdoc:pci-scope-decision-mar-2026"
    occurred_at: "2026-03-18T10:00:00Z"
    options:
      - {label: "SAQ-A (iframe only)", chosen: true}
      - {label: "SAQ-D (full cardholder data environment)", chosen: false}
    evidence: [ev-003]
    accepted_by: [human:tom-b, human:alex-m]
    score:
      stakes: 65.0
      irreversibility: 0.55
      actionability: 1.0
      quality: 0.88

  - id: "d-007"
    title: "Charge platforms a flat 0.5 % processing fee"
    rationale: >
      Flat rate is simpler to explain to customers and reduces billing
      disputes.  Tiered pricing optimises margin at high volume but we
      have no high-volume customers yet.  Per-transaction ($0.10 + 0.2 %)
      favours low-value, high-frequency transactions which is not our
      current mix.  We'll revisit after first $10 M GMV.
    actor: "human:tom-b"
    topic_keys: [payments, product]
    source: cli
    occurred_at: "2026-03-25T11:00:00Z"
    options:
      - {label: "Flat 0.5 %", chosen: true}
      - {label: "Tiered (0.3–0.8 %)", chosen: false}
      - {label: "Per-transaction ($0.10 + 0.2 %)", chosen: false}
    accepted_by: [human:dan-r]
    score:
      stakes: 45.0
      irreversibility: 0.40
      actionability: 1.0
      quality: 0.60

  # ── Chapter 3: Security Incident (May 2026) ───────────────────────────────

  - id: "d-008"
    title: "Rotate all API tokens and enforce 2-FA on all developer accounts"
    rationale: >
      Three long-lived tokens were leaked via a compromised laptop.  Rotating
      every token is the only way to guarantee the blast radius is contained.
      2-FA prevents credential reuse even if another laptop is compromised.
      Disruption to active integrations is acceptable given the security risk.
    actor: "human:sarah-l"
    topic_keys: [security]
    source: slack
    source_ref: "slack:C07INCIDENT:1747132800"
    occurred_at: "2026-05-13T10:00:00Z"
    accepted_by: [human:sarah-l, human:dan-r]
    rejected_by: [human:alex-m]
    hypotheses: [hy-002]
    evidence: [ev-004]
    score:
      stakes: 95.0
      irreversibility: 0.50
      actionability: 1.0
      quality: 0.51

  - id: "d-009"
    title: "Disable API-key authentication; require JWT for all API access"
    rationale: >
      API keys are static secrets with no expiry.  Post-incident analysis
      shows long-lived keys are the primary risk surface.  JWT tokens expire
      in 24 h and are tied to a session.  Deprecating API keys closes that
      attack vector permanently.
    actor: "human:sarah-l"
    topic_keys: [security]
    source: slack
    source_ref: "slack:C07INCIDENT:1747219200"
    occurred_at: "2026-05-14T09:00:00Z"
    accepted_by: [human:sarah-l, agent:claude:sec]
    rejected_by: [human:priya-k]
    score:
      stakes: 70.0
      irreversibility: 0.60
      actionability: 1.0
      quality: 0.54

  # ── Chapter 4: Auth Supersession Chain (Jun 2026) ─────────────────────────
  # D-003 → D-010 → D-011
  # Triggered by: hy-001 REFUTED (JWT doesn't scale past 500 users)

  - id: "d-010"
    title: "Migrate API authentication to WorkOS AuthKit"
    rationale: >
      Load testing at 520 concurrent users revealed JWT + in-memory cache
      causes 8 % 401 errors due to cache eviction races (hypothesis hy-001
      refuted by ev-009).  Adding Redis eliminates errors but doubles auth
      latency.  WorkOS AuthKit at 280 ms p99 at 1000 concurrent is superior.
      Post-Series-A budget now justifies the $24 K/year cost.
      Supersedes d-003 (stateless JWT approach proved insufficient).
    actor: "human:alex-m"
    topic_keys: [security, infrastructure]
    source: cli
    occurred_at: "2026-06-22T14:00:00Z"
    options:
      - {label: "WorkOS AuthKit", chosen: true}
      - {label: "Redis-backed JWT", chosen: false}
      - {label: "Auth0", chosen: false}
    evidence: [ev-009]
    hypotheses: [hy-001]
    accepted_by: [human:priya-k, human:sarah-l]
    superseded_by: "d-011"
    score:
      stakes: 65.0
      irreversibility: 0.55
      actionability: 1.0
      quality: 0.77

  - id: "d-011"
    title: "Add SSO fallback provider (Okta) alongside WorkOS for auth resilience"
    rationale: >
      WorkOS experienced a 47-minute outage on 2026-07-03 that caused 12 %
      login failures.  Single auth provider is a critical availability risk.
      Adding Okta as a hot standby allows failover in under 5 minutes.
      Supersedes d-010 (WorkOS-only approach proved insufficient for 99.9 % SLA).
    actor: "human:priya-k"
    topic_keys: [security, infrastructure]
    source: document
    source_ref: "gdoc:auth-resilience-decision-jul-2026"
    occurred_at: "2026-07-07T11:00:00Z"
    options:
      - {label: "WorkOS + Okta hot standby", chosen: true}
      - {label: "WorkOS only (accept risk)", chosen: false}
      - {label: "Build in-house SSO abstraction layer", chosen: false}
    evidence: [ev-006]
    accepted_by: [human:alex-m, human:tom-b]
    score:
      stakes: 55.0
      irreversibility: 0.50
      actionability: 1.0
      quality: 0.83

  # ── Chapter 4b: DB Supersession Chain (Jun–Sep 2026) ─────────────────────
  # D-001 → D-012 → D-013

  - id: "d-012"
    title: "Add a Postgres read replica for dashboard and analytics queries"
    rationale: >
      Dashboard queries now account for 35 % of DB load and are causing
      p95 latency degradation on write paths.  A read replica isolates
      read load.  This is the first step on the DB scaling ladder;
      connection pooling and sharding are deferred.
      Extends d-001 (still Postgres, adding operational topology).
    actor: "human:priya-k"
    topic_keys: [infrastructure]
    source: cli
    occurred_at: "2026-06-30T10:00:00Z"
    options:
      - {label: "Postgres primary + read replica", chosen: true}
      - {label: "Read-through cache (Redis)", chosen: false}
    accepted_by: [human:alex-m]
    superseded_by: "d-013"
    score:
      stakes: 50.0
      irreversibility: 0.45
      actionability: 1.0
      quality: 0.74

  - id: "d-013"
    title: "Add PgBouncer connection pooler in front of Postgres (primary + replica)"
    rationale: >
      After read replica deploy, we still see connection exhaustion during peak
      (>180 connections).  PgBouncer in transaction-pooling mode lets us serve
      1000+ app connections over 50 backend connections.  Eliminates connection
      exhaustion without schema changes.
      Extends d-012 (adds pooler layer to existing read-replica topology).
    actor: "human:priya-k"
    topic_keys: [infrastructure]
    source: cli
    occurred_at: "2026-09-05T14:00:00Z"
    options:
      - {label: "PgBouncer transaction mode", chosen: true}
      - {label: "RDS Proxy (AWS managed)", chosen: false}
      - {label: "Shard the database", chosen: false}
    accepted_by: [human:alex-m, agent:claude:arch]
    score:
      stakes: 40.0
      irreversibility: 0.35
      actionability: 1.0
      quality: 0.80

  # ── Chapter 5: Product Pivot (Aug–Oct 2026) ───────────────────────────────

  - id: "d-014"
    title: "Do not add cryptocurrency payment support in 2026"
    rationale: >
      DecisionRequest dr-001 asked whether to add crypto.  After analysis:
      crypto volume in B2B e-commerce is < 0.3 % of GMV per Stripe data.
      Compliance burden (FinCEN MSB registration, BitLicense NY) is
      disproportionate.  Engineering cost is 3+ months.  Deferred to 2027
      reassessment when regulatory clarity improves.
    actor: "human:tom-b"
    topic_keys: [product, payments]
    source: cli
    occurred_at: "2026-08-28T10:00:00Z"
    options:
      - {label: "Add crypto support (BTC + ETH)", chosen: false}
      - {label: "Defer to 2027", chosen: true}
    accepted_by: [human:dan-r, human:sarah-l]
    score:
      stakes: 35.0
      irreversibility: 0.25
      actionability: 1.0
      quality: 0.72

  - id: "d-015"
    title: "Expand product to EU market (starting with Germany + Netherlands)"
    rationale: >
      38 % of surveyed platforms are expanding to EU within 12 months.
      iDEAL (NL) and SOFORT (DE) are top-requested payment methods.
      Stripe supports both natively.  We target Q1 2027 GA;
      compliance groundwork (GDPR, local payment methods) starts Q4 2026.
    actor: "human:tom-b"
    topic_keys: [product, payments]
    source: document
    source_ref: "gdoc:eu-expansion-decision-sep-2026"
    occurred_at: "2026-09-10T11:00:00Z"
    options:
      - {label: "EU expansion (DE + NL first)", chosen: true}
      - {label: "APAC expansion", chosen: false}
      - {label: "Deepen US coverage only", chosen: false}
    evidence: [ev-005]
    accepted_by: [human:dan-r, human:priya-k]
    score:
      stakes: 130.0
      irreversibility: 0.60
      actionability: 0.90
      quality: 0.76

  - id: "d-016"
    title: "Deprecate Webhook API v1; require migration to Webhook API v2"
    rationale: >
      Webhook v1 lacks idempotency keys, has no retry logic, and exposes
      raw event payloads that caused two data-consistency incidents in Q2.
      v2 fixes all three.  We'll give customers 6 months (until 2027-04-01)
      to migrate.  v1 will be disabled, not sunset slowly, to avoid split
      maintenance burden.
    actor: "human:priya-k"
    topic_keys: [product, engineering]
    source: cli
    occurred_at: "2026-09-20T14:00:00Z"
    accepted_by: [human:dan-r, human:alex-m]
    score:
      stakes: 25.0
      irreversibility: 0.55
      actionability: 1.0
      quality: 0.78

  - id: "d-017"
    title: "Host EU customer data exclusively in AWS eu-central-1 (Frankfurt)"
    rationale: >
      GDPR data residency requires EU personal data stay in the EU or an
      adequacy-listed country.  eu-central-1 (Frankfurt) and eu-west-1
      (Dublin) both qualify.  Frankfurt has lower latency to our primary
      DE + NL markets (13 ms vs 22 ms from Dublin).  All EU tenants get
      an isolated RDS instance in eu-central-1; no cross-region replication
      of personal data.
    actor: "human:sarah-l"
    topic_keys: [infrastructure, security, payments]
    source: cli
    occurred_at: "2026-10-05T10:00:00Z"
    options:
