name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      # fail-fast: false already lets every platform attempt its build, so a
      # single failure still yields a full diagnostic picture. Do NOT add
      # continue-on-error here: it masks build failures from the publish gate
      # and lets an incomplete release ship (v0.4.0 published 2/4 platforms).
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: hivemind-linux-x86_64
            linker: ""
            stripper: strip
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: hivemind-linux-arm64
            linker: aarch64-linux-gnu-gcc
            stripper: aarch64-linux-gnu-strip
          # x86_64-apple-darwin (Intel Mac) is intentionally not built: the
          # ONNX runtime (ort-sys, via fastembed) ships no prebuilt for that
          # target and building it from source in CI is not worth it for a
          # shrinking platform. Intel Mac users install via `cargo install
          # --git`. If this is revisited, add the target back here AND to the
          # publish guard's expected-artifact list below in the same commit.
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: hivemind-macos-arm64
            linker: ""
            stripper: strip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux ARM64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          # g++-aarch64-linux-gnu is required, not just gcc-: native deps
          # (ort/onnxruntime via fastembed, onig_sys) link against -lstdc++,
          # and gcc- alone ships no aarch64 libstdc++ -> "cannot find -lstdc++".
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.linker }}" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER="${{ matrix.linker }}"
            export CC_aarch64_unknown_linux_gnu="${{ matrix.linker }}"
            export CXX_aarch64_unknown_linux_gnu="aarch64-linux-gnu-g++"
            export AR_aarch64_unknown_linux_gnu="aarch64-linux-gnu-ar"
          fi
          cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package tarball and checksum
        shell: bash
        run: |
          set -euo pipefail
          archive="${{ matrix.artifact }}.tar.gz"
          mkdir -p dist package
          cp "target/${{ matrix.target }}/release/hivemind" package/hivemind
          stripper="${{ matrix.stripper }}"
          if [ "${{ runner.os }}" = "macOS" ]; then
            strip -x package/hivemind
          elif [ -n "${stripper}" ]; then
            "${stripper}" package/hivemind
          fi
          tar -C package -czf "dist/${archive}" hivemind
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${archive}" > "${archive}.sha256")
          else
            (cd dist && shasum -a 256 "${archive}" > "${archive}.sha256")
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    # No `if:` override here on purpose. The default is success(), so a failed
    # build job skips publish entirely. `if: !cancelled()` previously forced
    # publish to run even when platforms failed, shipping a partial release.
    needs: build

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: hivemind-*
          path: dist
          merge-multiple: true

      # Defense in depth: the success() gate above should already prevent this,
      # but an artifact that fails to upload would still slip through. Never
      # publish a release that is missing a platform -- "the workflow succeeded"
      # is not proof that every artifact is actually present.
      - name: Verify all platform artifacts are present
        shell: bash
        run: |
          set -euo pipefail
          # Keep this list in lockstep with the build matrix above. Intel
          # macOS (hivemind-macos-x86_64) is intentionally not built.
          expected=(
            hivemind-linux-x86_64.tar.gz
            hivemind-linux-arm64.tar.gz
            hivemind-macos-arm64.tar.gz
          )
          missing=()
          for artifact in "${expected[@]}"; do
            [ -s "dist/${artifact}" ] || missing+=("${artifact}")
            [ -s "dist/${artifact}.sha256" ] || missing+=("${artifact}.sha256")
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Refusing to publish an incomplete release."
            for artifact in "${missing[@]}"; do
              echo "::error::  missing: ${artifact}"
            done
            echo "Present in dist/:"
            ls -la dist/ || true
            exit 1
          fi
          echo "All ${#expected[@]} platform artifacts present and non-empty."

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${tag}" dist/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${tag}" \
              --generate-notes
          fi

  publish-docker:
    name: Publish server image to ghcr
    runs-on: ubuntu-latest
    # Publish only after all platform binaries succeed so the release is coherent.
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
