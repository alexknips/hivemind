name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: hivemind-linux-x86_64
            linker: ""
            stripper: strip
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: hivemind-linux-arm64
            linker: aarch64-linux-gnu-gcc
            stripper: aarch64-linux-gnu-strip
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: hivemind-macos-x86_64
            linker: ""
            stripper: strip
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: hivemind-macos-arm64
            linker: ""
            stripper: strip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.linker }}" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER="${{ matrix.linker }}"
            export CC_aarch64_unknown_linux_gnu="${{ matrix.linker }}"
            export AR_aarch64_unknown_linux_gnu="aarch64-linux-gnu-ar"
          fi
          cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package tarball and checksum
        shell: bash
        run: |
          set -euo pipefail
          archive="${{ matrix.artifact }}.tar.gz"
          mkdir -p dist package
          cp "target/${{ matrix.target }}/release/hivemind" package/hivemind
          stripper="${{ matrix.stripper }}"
          if [ "${{ runner.os }}" = "macOS" ]; then
            strip -x package/hivemind
          elif [ -n "${stripper}" ]; then
            "${stripper}" package/hivemind
          fi
          tar -C package -czf "dist/${archive}" hivemind
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${archive}" > "${archive}.sha256")
          else
            (cd dist && shasum -a 256 "${archive}" > "${archive}.sha256")
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !cancelled() }}

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: hivemind-*
          path: dist
          merge-multiple: true

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${tag}" dist/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${tag}" \
              --generate-notes
          fi
