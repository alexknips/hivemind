name: Deploy to Fly.io

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "Dockerfile"
      - "fly.toml"
      - "Cargo.toml"
      - "Cargo.lock"

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    # Prevent concurrent deploys — queue them so each commit lands in order.
    concurrency:
      group: fly-deploy
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Deploy to Fly.io
        uses: superfly/flyctl-actions@master
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        with:
          args: "deploy --remote-only"
