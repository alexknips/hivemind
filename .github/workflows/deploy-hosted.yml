name: Deploy to Fly.io

on:
  # Manual-only until the Fly target is provisioned (app + Postgres + secrets)
  # and fly.toml placeholders are replaced — see docs/DEPLOYMENT.md. Re-enable
  # the push trigger (src/**, Dockerfile, fly.toml, Cargo.toml, Cargo.lock) for
  # auto-deploy once `fly deploy` succeeds manually.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    # Prevent concurrent deploys — queue them so each commit lands in order.
    concurrency:
      group: fly-deploy
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Deploy to Fly.io
        uses: superfly/flyctl-actions@master
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        with:
          args: "deploy --remote-only"
