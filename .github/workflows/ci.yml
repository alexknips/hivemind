name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

  tui-feature:
    name: Optional TUI feature
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run TUI clippy
        run: cargo clippy --locked --all-targets --features tui -- -D warnings

      - name: Run TUI tests
        run: cargo test --locked --features tui

  kuzu-feature:
    name: Optional Kuzu feature (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      # graph-kuzu has a tracked native link issue (hivemind-oj7qr). Keep the
      # signal visible without blocking default CI until that bead lands.
      - name: Run Kuzu feature tests
        run: cargo test --locked --features graph-kuzu kuzu -- --nocapture

  ubs:
    name: UBS critical scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install UBS
        run: |
          curl -fsSL "https://raw.githubusercontent.com/Dicklesworthstone/ultimate_bug_scanner/main/install.sh?$(date +%s)" \
            | bash -s -- --non-interactive
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run UBS critical scan
        run: ~/.local/share/ubs/modules/ubs-rust.sh . --format=json --quiet --ci --no-cargo --fail-critical=1

      # UBS warning baseline established by hivemind-ubs-warning-triage-baseline-h4p2m on
      # 2026-05-22 with `ubs --ci --only=rust --beads-jsonl=/tmp/ubs.jsonl .`:
      # 1937 warnings across 47 Rust files. Top categories are tracked in BR:
      # unwrap/expect panic inventory (hivemind-dfc5e), runtime panic surfaces
      # (hivemind-gofiy), and loop allocation hotspots (hivemind-41n8s). This
      # gate prevents regression while allowing those inventories to be paid down.
      - name: Run UBS warning baseline scan
        shell: bash
        run: |
          set -euo pipefail
          baseline_warnings=1937
          ~/.local/bin/ubs --ci --only=rust --report-json=/tmp/ubs-warning-summary.json .
          warnings="$(jq -r '.totals.warning' /tmp/ubs-warning-summary.json)"
          if [ "${warnings}" -gt "${baseline_warnings}" ]; then
            echo "UBS warning count grew from ${baseline_warnings} to ${warnings}."
            exit 1
          fi
          echo "UBS warning count ${warnings} is within baseline ${baseline_warnings}."
