services:
  hivemind:
    # Pre-built server image from ghcr; `docker compose pull` fetches it.
    # To build from source instead: docker compose up --build
    image: ghcr.io/alexknips/hivemind:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${HIVEMIND_PORT:-8080}:8080"
    environment:
      HIVEMIND_DIR: /data
      HIVEMIND_PORT: "8080"
      # Postgres backend — resolves to the companion postgres service.
      # Remove to fall back to SQLite stored in the hivemind-data volume.
      HIVEMIND_DATABASE_URL: "postgres://hivemind:${POSTGRES_PASSWORD:-hivemind}@postgres:5432/hivemind"
      # Per-tenant bearer tokens are issued via POST /v1/tenants (admin-gated).
      # Set HIVEMIND_ADMIN_KEY before provisioning your first tenant.
      HIVEMIND_ADMIN_KEY: "${HIVEMIND_ADMIN_KEY:-}"
      # Optional: enable the Layer-3 ingest classifier (Claude Haiku).
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      # Optional: comma-separated CORS origins for browser SPA access.
      HIVEMIND_CORS_ORIGINS: "${HIVEMIND_CORS_ORIGINS:-}"
    volumes:
      - hivemind-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: hivemind
      POSTGRES_USER: hivemind
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-hivemind}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hivemind -d hivemind"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  hivemind-data:
  postgres-data:
