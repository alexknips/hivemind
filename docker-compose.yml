services:
  hivemind:
    build:
      context: .
      dockerfile: Dockerfile
    image: hivemind:latest
    ports:
      - "${HIVEMIND_PORT:-8080}:8080"
    environment:
      HIVEMIND_DIR: /data
      HIVEMIND_PORT: "8080"
      HIVEMIND_TENANT: "${HIVEMIND_TENANT:-local}"
      HIVEMIND_API_KEY: "${HIVEMIND_API_KEY:-}"
    volumes:
      - hivemind-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # Postgres is available for the shared-backend-postgres feature.
  # HiveMind defaults to SQLite (HIVEMIND_DIR volume). To use Postgres,
  # wire DATABASE_URL to this service and select the postgres backend.
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: hivemind
      POSTGRES_USER: hivemind
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-hivemind}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hivemind -d hivemind"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  hivemind-data:
  postgres-data:
